<title>Lift License Renewal - Fee Calculator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
:root{--bg:#f5f0eb;--card:#fff;--pri:#1a3a5c;--acc:#c0392b;--txt:#2c2c2c;--mut:#6b7280;--bdr:#d1c7b7;--hl:#fef3c7}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);line-height:1.5}
header{background:var(--pri);color:#fff;padding:18px 20px;text-align:center}
header h1{font-size:1.15rem;font-weight:700}
header p{font-size:0.78rem;opacity:0.8;margin-top:2px}
.fee-view{max-width:600px;margin:20px auto;padding:0 12px}
.fee-card{background:var(--card);border-radius:12px;border:1px solid var(--bdr);overflow:hidden}
.fee-card .top{background:var(--pri);color:#fff;padding:16px 18px}
.fee-card .top h2{font-size:1rem;font-weight:600}
.fee-card .top .info{opacity:0.8;font-size:0.82rem;margin-top:4px;line-height:1.6}
.lt-toggle{padding:12px 18px;background:#eef2f7;display:flex;align-items:center;gap:10px;font-size:0.88rem;flex-wrap:wrap}
.lt-toggle label{font-weight:600;color:var(--pri)}
.lt-toggle select{padding:6px 10px;border-radius:6px;border:1px solid var(--bdr);font-family:inherit;font-size:0.88rem}
.fee-rows{padding:14px 18px}
.fee-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #eee;font-size:0.88rem}
.fee-row:last-child{border-bottom:none}
.fee-row .lb{color:var(--mut);max-width:55%}
.fee-row .vl{font-weight:600;text-align:right}
.fee-total{background:var(--hl);padding:14px 18px;display:flex;justify-content:space-between;font-size:1.05rem;font-weight:700;flex-wrap:wrap;gap:4px}
.fee-total .am{color:var(--acc)}
.fee-note{padding:10px 18px;font-size:0.75rem;color:var(--mut);text-align:center;border-top:1px solid #eee}
.sub-table{padding:8px 18px;background:#f9f7f4}
.sub-table table{width:100%;font-size:0.8rem;border-collapse:collapse}
.sub-table th{text-align:left;color:var(--pri);padding:4px 6px;border-bottom:2px solid var(--bdr);font-weight:600}
.sub-table td{padding:4px 6px;border-bottom:1px solid #eee}
.sub-table td.r{text-align:right;font-weight:600}
/* List view */
.ctrls{max-width:920px;margin:14px auto;padding:0 12px;display:flex;gap:8px;flex-wrap:wrap}
.ctrls input{flex:1;min-width:180px;padding:9px 12px;border:1px solid var(--bdr);border-radius:8px;font-size:0.88rem;font-family:inherit}
.ctrls button{padding:9px 16px;background:var(--pri);color:#fff;border:none;border-radius:8px;font-family:inherit;font-weight:600;cursor:pointer;font-size:0.85rem}
.grid{max-width:920px;margin:14px auto;padding:0 12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.c-card{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:box-shadow .2s}
.c-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.1)}
.c-card h3{font-size:0.78rem;font-weight:600;color:var(--pri);min-height:2.2em}
.c-card .meta{font-size:0.72rem;color:var(--mut);margin:3px 0 6px}
.c-card .total{font-weight:700;color:var(--acc);font-size:0.95rem}
.pager{max-width:920px;margin:8px auto;padding:0 12px;display:flex;gap:5px;justify-content:center;flex-wrap:wrap}
.pager button{padding:5px 10px;border:1px solid var(--bdr);border-radius:6px;background:#fff;cursor:pointer;font-family:inherit;font-size:0.8rem}
.pager button.act{background:var(--pri);color:#fff;border-color:var(--pri)}
.dept{background:var(--pri);color:#fff;padding:8px 18px;font-size:0.7rem;text-align:center;opacity:0.7;margin-top:20px}
@media print{.ctrls,.pager{display:none}.grid{gap:8px}.c-card{page-break-inside:avoid;border:1px solid #999}}
</style>
</head>

const K=new Date(2018,9,10);
function MB(a,b){let m=(b.getFullYear()-a.getFullYear())*12+b.getMonth()-a.getMonth();if(b.getDate()>a.getDate())m++;return Math.max(0,m)}
function YC(a,b){return Math.max(0,Math.ceil((b-a)/31557600000))}
function SM(dt,n){let m=dt.getMonth()+1-n,y=dt.getFullYear();while(m<=0){m+=12;y--}let d=Math.min(dt.getDate(),new Date(y,m,0).getDate());return new Date(y,m-1,d)}

function calcOne(exp_s,cd,lt){
  let exp=new Date(exp_s),due=SM(exp,3),rate=lt==="5+"?10000:5000;
  let pR=0,pP=0,oR=0,oP=0;
  if(exp<K){let pe=new Date(Math.min(K,cd));pR=YC(exp,pe)*500;pP=MB(due,pe)*50}
  if(cd>K){let ps=exp<K?K:exp;oR=Math.ceil(YC(ps,cd)/3)*rate;oP=MB(exp<K?K:due,cd)*500}
  return{tR:pR+oR,tP:pP+oP,pl:pR+oR+pP+oP}
}

function calcAll(c,cd,lt){
  let tR=0,tP=0;
  c.s.forEach(s=>{let f=calcOne(s.e,cd,lt);tR+=f.tR;tP+=f.tP});
  return{tR,tP,pl:tR+tP,g:(tR+tP)*((c.s.length>1)?1:c.l),lifts:c.l,
    perLift:Math.round((tR+tP)/(c.l||1))}
}

// For multi-lift: each sub-lift fees * 1 lift, grand = sum of all
function calcMulti(c,cd,lt){
  let tR=0,tP=0,subs=[];
  c.s.forEach(s=>{
    let f=calcOne(s.e,cd,lt);
    subs.push({...s,tR:f.tR,tP:f.tP,pl:f.pl});
    tR+=f.tR;tP+=f.tP
  });
  return{tR,tP,grand:tR+tP,subs}
}

function F(n){return"\u20B9"+n.toLocaleString("en-IN")}
function FD(d){return d.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"})}

const app=document.getElementById("app");
const P=new URLSearchParams(location.search);
const vid=P.get("id");

if(vid){
  const c=D.find(x=>x.i==vid);
  if(!c){app.innerHTML='<div class="fee-view"><p>Consumer not found.</p></div>';}
  else{
    const today=new Date();today.setHours(0,0,0,0);
    const isMulti=c.s.length>1;
    
    // Build info lines
    let infoHtml='Lifts: '+c.l+'<br>';
    if(isMulti){
      c.s.forEach(s=>{infoHtml+=(s.b||'')+': '+s.r+' (Exp: '+s.e+')<br>'});
    } else {
      infoHtml+='Reg: '+c.s[0].r+'<br>Expiry: '+c.s[0].e;
    }
    
    function render(lt){
      let html='';
      if(isMulti){
        let m=calcMulti(c,today,lt);
        html+='<div class="sub-table"><table><tr><th>Lift</th><th>Reg.No</th><th>Renewal</th><th>Penalty</th><th>Total</th></tr>';
        m.subs.forEach(s=>{
          html+='<tr><td>'+(s.b||'-')+'</td><td>'+s.r+'</td><td class=r>'+F(s.tR)+'</td><td class=r>'+F(s.tP)+'</td><td class=r>'+F(s.pl)+'</td></tr>';
        });
        html+='<tr style="font-weight:700;border-top:2px solid #1a3a5c"><td colspan=2>Total ('+c.l+' Lifts)</td><td class=r>'+F(m.tR)+'</td><td class=r>'+F(m.tP)+'</td><td class=r>'+F(m.grand)+'</td></tr></table></div>';
        document.getElementById("feeTotal").innerHTML='<span>Grand Total ('+c.l+' Lifts)</span><span class="am">'+F(m.grand)+'</span>';
      } else {
        let f=calcOne(c.s[0].e,today,lt);
        html+='<div class="fee-row"><span class=lb>Renewal Fees</span><span class=vl>'+F(f.tR)+'</span></div>';
        html+='<div class="fee-row"><span class=lb>Penalty Fees</span><span class=vl>'+F(f.tP)+'</span></div>';
        html+='<div class="fee-row"><span class=lb>Total per Lift</span><span class=vl>'+F(f.pl)+'</span></div>';
        let grand=f.pl*c.l;
        document.getElementById("feeTotal").innerHTML='<span>Grand Total ('+c.l+' Lift'+(c.l>1?'s':'')+')</span><span class="am">'+F(grand)+'</span>';
      }
      document.getElementById("feeBody").innerHTML=html;
    }
    
    app.innerHTML=\`<div class="fee-view"><div class="fee-card">
      <div class="top"><h2>\${c.n}</h2><div class="info">\${infoHtml}</div></div>
      <div class="lt-toggle">
        <label>Landing Type:</label>
        <select id="ltSel" onchange="render(this.value)">
          <option value="5" selected>5 Landings (\u20B95,000/period)</option>
          <option value="5+">5+ Landings (\u20B910,000/period)</option>
        </select>
      </div>
      <div id="feeBody"></div>
      <div class="fee-total" id="feeTotal"></div>
      <div class="fee-note">Fees calculated dynamically as on \${FD(today)}. Penalty accrues monthly.<br>Change landing type above if applicable.</div>
    </div></div>\`;
    window.render=render;
    render("5");
  }
} else {
  // List view
  const PS=24;let pg=0,flt="";
  function fil(){let f=flt.toLowerCase();return D.filter(c=>!f||c.n.toLowerCase().includes(f)||c.s.some(s=>s.r.toLowerCase().includes(f))||String(c.i).includes(f))}
  function ren(){
    let ls=fil(),pages=Math.ceil(ls.length/PS);
    if(pg>=pages)pg=Math.max(0,pages-1);
    let sl=ls.slice(pg*PS,(pg+1)*PS);
    let td=new Date();td.setHours(0,0,0,0);
    let gh='';
    sl.forEach(c=>{
      let m=calcMulti(c,td,"5");
      let regs=c.s.length>1?c.s.map(s=>(s.b||'')+'-'+s.r).join(', '):c.s[0].r;
      gh+=\`<div class="c-card" onclick="location.href='?id=\${c.i}'">
        <h3>\${c.i}. \${c.n}</h3>
        <div class="meta">Reg: \${regs.substring(0,60)}\${regs.length>60?'...':''} | Lifts: \${c.l}</div>
        <div>As on \${FD(td)}: <span class="total">\${F(m.grand)}</span></div>
      </div>\`;
    });
    document.getElementById("grid").innerHTML=gh;
    let ph='';for(let i=0;i<pages;i++)ph+=\`<button class="\${i===pg?'act':''}" onclick="gp(\${i})">\${i+1}</button>\`;
    document.getElementById("pgr").innerHTML=ph;
  }
  window.gp=function(p){pg=p;ren();scrollTo(0,180)};
  app.innerHTML=\`<div class="ctrls"><input type="text" id="srch" placeholder="Search name, reg no, or serial..."><button onclick="window.print()">Print</button></div><div class="pager" id="pgr"></div><div class="grid" id="grid"></div>\`;
  document.getElementById("srch").addEventListener("input",e=>{flt=e.target.value;pg=0;ren()});
  ren();
}
