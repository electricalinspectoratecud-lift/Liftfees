<title>Lift License Renewal - Fee Calculator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
:root{--bg:#f5f0eb;--card:#fff;--pri:#1a3a5c;--acc:#c0392b;--txt:#2c2c2c;--mut:#6b7280;--bdr:#d1c7b7;--hl:#fef3c7;--govt:#1e7d3a;--govtBg:#e6f4ec}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);line-height:1.5}
header{background:var(--pri);color:#fff;padding:18px 20px;text-align:center}
header h1{font-size:1.15rem;font-weight:700}
header p{font-size:0.78rem;opacity:0.85;margin-top:2px}
.fee-view{max-width:640px;margin:20px auto;padding:0 12px}
.fee-card{background:var(--card);border-radius:12px;border:1px solid var(--bdr);overflow:hidden}
.fee-card .top{background:var(--pri);color:#fff;padding:16px 18px}
.fee-card .top h2{font-size:1rem;font-weight:600;line-height:1.35}
.fee-card .top .info{opacity:0.85;font-size:0.82rem;margin-top:6px;line-height:1.6}
.type-tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:0.72rem;font-weight:700;margin-bottom:6px;letter-spacing:.03em}
.type-P{background:var(--acc);color:#fff}
.type-G{background:var(--govt);color:#fff}
.govt-banner{background:var(--govtBg);color:var(--govt);padding:14px 18px;text-align:center;font-weight:600;font-size:0.95rem;border-bottom:1px solid #cfe4d6}
.fee-rows{padding:14px 18px}
.fee-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #eee;font-size:0.88rem}
.fee-row:last-child{border-bottom:none}
.fee-row .lb{color:var(--mut);max-width:60%}
.fee-row .vl{font-weight:600;text-align:right}
.fee-total{background:var(--hl);padding:14px 18px;display:flex;justify-content:space-between;font-size:1.05rem;font-weight:700;flex-wrap:wrap;gap:4px}
.fee-total .am{color:var(--acc)}
.fee-total.govt{background:var(--govtBg)}
.fee-total.govt .am{color:var(--govt)}
.dates-row{padding:12px 18px;background:#f9f7f4;font-size:0.82rem;color:var(--mut);border-top:1px solid #eee;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
.dates-row div{min-width:45%}
.dates-row b{color:var(--txt);display:block;font-size:0.9rem}
.fee-note{padding:12px 18px;font-size:0.72rem;color:var(--mut);text-align:center;border-top:1px solid #eee;line-height:1.5}
.sub-table{padding:8px 18px;background:#f9f7f4}
.sub-table table{width:100%;font-size:0.8rem;border-collapse:collapse}
.sub-table th{text-align:left;color:var(--pri);padding:4px 6px;border-bottom:2px solid var(--bdr);font-weight:600}
.sub-table td{padding:4px 6px;border-bottom:1px solid #eee}
.sub-table td.r{text-align:right;font-weight:600}
.warn{background:#fff3cd;color:#7a5900;padding:10px 18px;font-size:0.8rem;text-align:center;border-top:1px solid #f0dea6}
/* List view */
.ctrls{max-width:920px;margin:14px auto;padding:0 12px;display:flex;gap:8px;flex-wrap:wrap}
.ctrls input{flex:1;min-width:180px;padding:9px 12px;border:1px solid var(--bdr);border-radius:8px;font-size:0.88rem;font-family:inherit}
.ctrls button,.ctrls select{padding:9px 12px;background:var(--pri);color:#fff;border:none;border-radius:8px;font-family:inherit;font-weight:600;cursor:pointer;font-size:0.85rem}
.ctrls select{background:#fff;color:var(--txt);border:1px solid var(--bdr)}
.grid{max-width:920px;margin:14px auto;padding:0 12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.c-card{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:box-shadow .2s;position:relative}
.c-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.1)}
.c-card .tag{position:absolute;top:8px;right:8px;padding:2px 8px;border-radius:10px;font-size:0.65rem;font-weight:700}
.c-card .tag.P{background:var(--acc);color:#fff}
.c-card .tag.G{background:var(--govt);color:#fff}
.c-card h3{font-size:0.78rem;font-weight:600;color:var(--pri);min-height:2.2em;margin-top:4px}
.c-card .meta{font-size:0.72rem;color:var(--mut);margin:3px 0 6px}
.c-card .total{font-weight:700;color:var(--acc);font-size:0.95rem}
.c-card.g .total{color:var(--govt)}
.pager{max-width:920px;margin:8px auto;padding:0 12px;display:flex;gap:5px;justify-content:center;flex-wrap:wrap}
.pager button{padding:5px 10px;border:1px solid var(--bdr);border-radius:6px;background:#fff;cursor:pointer;font-family:inherit;font-size:0.8rem}
.pager button.act{background:var(--pri);color:#fff;border-color:var(--pri)}
.dept{background:var(--pri);color:#fff;padding:8px 18px;font-size:0.7rem;text-align:center;opacity:0.75;margin-top:20px}
@media print{.ctrls,.pager{display:none}.grid{gap:8px}.c-card{page-break-inside:avoid;border:1px solid #999}}
</style>
</head>

/* -------------------------------------------------------------
   Fee rules (Amendment Act 2025, w.e.f. 03.02.2026)
   ------------------------------------------------------------- */
const RENEWAL_FEE_PER_LIFT = 5000;   // Rs.  Private only
const PENALTY_PER_MONTH    = 500;    // Rs. per lift per month of delay
const MAX_PENALTY_PER_LIFT = 1500;   // Rs. (3-month cap)
const APP_WINDOW_MONTHS    = 3;      // Apply by (expiry - 3 months)
const RENEWAL_YEARS        = 5;      // Validity extension

/* -------------------------------------------------------------
   Helpers
   ------------------------------------------------------------- */
function addMonths(dt, n){
  const y = dt.getFullYear(), m = dt.getMonth() + n, d = dt.getDate();
  const nd = new Date(y, m, 1);
  const last = new Date(nd.getFullYear(), nd.getMonth()+1, 0).getDate();
  nd.setDate(Math.min(d, last));
  return nd;
}
function addYears(dt, n){ return addMonths(dt, n*12); }
function monthsBetween(a, b){
  // Whole months from a to b, counting any fractional month as one full month
  if (b <= a) return 0;
  let m = (b.getFullYear()-a.getFullYear())*12 + (b.getMonth()-a.getMonth());
  if (b.getDate() > a.getDate()) m++;
  return Math.max(0, m);
}
function F(n){ return "\u20B9" + Number(n).toLocaleString("en-IN"); }
function FD(d){ return d.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}); }

/* -------------------------------------------------------------
   Core calculator — one lift
   ------------------------------------------------------------- */
function calcOne(expiryStr, calcDate, type){
  const expiry   = new Date(expiryStr);
  const deadline = addMonths(expiry, -APP_WINDOW_MONTHS);
  const validTill= addYears(expiry, RENEWAL_YEARS);

  if (type === 'G'){
    return { renewal:0, penalty:0, total:0,
             deadline, expiry, validTill, exempt:true };
  }
  const months = monthsBetween(deadline, calcDate);
  const penalty = Math.min(MAX_PENALTY_PER_LIFT, months * PENALTY_PER_MONTH);
  return {
    renewal: RENEWAL_FEE_PER_LIFT,
    penalty,
    total: RENEWAL_FEE_PER_LIFT + penalty,
    deadline, expiry, validTill,
    monthsLate: months,
    exempt:false
  };
}

/* -------------------------------------------------------------
   Aggregate — one consumer (may have several lifts / sub-registrations)
   ------------------------------------------------------------- */
function calcConsumer(c, calcDate){
  const perSub = c.s.map(s => Object.assign({}, s, calcOne(s.e, calcDate, c.t)));
  // If sub-array has fewer entries than c.l (single-expiry, N lifts),
  // multiply the single result by c.l.
  let renewal = 0, penalty = 0;
  if (perSub.length === 1){
    renewal = perSub[0].renewal * c.l;
    penalty = perSub[0].penalty * c.l;
  } else {
    perSub.forEach(p => { renewal += p.renewal; penalty += p.penalty; });
  }
  return {
    perSub,
    renewal, penalty,
    grand: renewal + penalty,
    validTill: perSub[0].validTill,
    exempt: c.t === 'G'
  };
}

/* =============================================================
   Rendering
   ============================================================= */
const app = document.getElementById("app");
const P = new URLSearchParams(location.search);
const vid = P.get("id");

if (vid){
  const c = D.find(x => x.i == vid);
  if (!c){
    app.innerHTML = '<div class="fee-view"><div class="fee-card"><div class="top"><h2>Consumer not found</h2></div></div></div>';
  } else {
    const today = new Date(); today.setHours(0,0,0,0);
    const isMulti = c.s.length > 1;
    const result = calcConsumer(c, today);
    const tLabel = c.t === 'G' ? 'GOVT / EXEMPT' : 'PRIVATE';

    // Header info
    let infoHtml = `<span class="type-tag type-${c.t}">${tLabel}</span><br>`
                 + `Total lifts: <b>${c.l}</b>`;
    if (isMulti){
      infoHtml += '<br>' + c.s.map(s => (s.b ? s.b+': ' : '')+s.r+' &middot; Expiry '+s.e).join('<br>');
    } else {
      infoHtml += `<br>Reg. No: ${c.s[0].r}<br>License Expiry: <b>${c.s[0].e}</b>`;
    }

    // Dates row (deadline + validity)
    const p0 = result.perSub[0];
    const datesHtml = `
      <div class="dates-row">
        <div><b>Apply by (deadline)</b>${FD(p0.deadline)}</div>
        <div><b>Renewed valid till</b>${FD(result.validTill)}</div>
      </div>`;

    // Body: fee rows (single) or sub-table (multi)
    let body = '';
    if (isMulti){
      body = '<div class="sub-table"><table>'
           + '<tr><th>Lift</th><th>Reg. No</th><th>Expiry</th><th>Renewal</th><th>Penalty</th><th>Total</th></tr>';
      result.perSub.forEach(s => {
        body += `<tr><td>${s.b||'-'}</td><td>${s.r}</td><td>${s.e}</td>`
              + `<td class=r>${F(s.renewal)}</td><td class=r>${F(s.penalty)}</td>`
              + `<td class=r>${F(s.total)}</td></tr>`;
      });
      body += `<tr style="font-weight:700;border-top:2px solid #1a3a5c">`
            + `<td colspan=3>Total (${c.l} Lifts)</td>`
            + `<td class=r>${F(result.renewal)}</td>`
            + `<td class=r>${F(result.penalty)}</td>`
            + `<td class=r>${F(result.grand)}</td></tr></table></div>`;
    } else {
      const perLift = result.perSub[0];
      body = `<div class="fee-rows">
        <div class="fee-row"><span class=lb>Renewal fee per lift</span><span class=vl>${F(perLift.renewal)}</span></div>
        <div class="fee-row"><span class=lb>Penalty per lift ${perLift.monthsLate?`(${perLift.monthsLate} mo late, capped)`:'(on time)'}</span><span class=vl>${F(perLift.penalty)}</span></div>
        <div class="fee-row"><span class=lb>Number of lifts</span><span class=vl>&#215; ${c.l}</span></div>
        <div class="fee-row"><span class=lb>Renewal total</span><span class=vl>${F(result.renewal)}</span></div>
        <div class="fee-row"><span class=lb>Penalty total</span><span class=vl>${F(result.penalty)}</span></div>
      </div>`;
    }

    const totalHtml = result.exempt
      ? `<div class="govt-banner">GOVT lift &mdash; No renewal fee or penalty payable</div>
         <div class="fee-total govt"><span>Grand Total</span><span class="am">${F(0)}</span></div>`
      : `<div class="fee-total"><span>Grand Total (${c.l} Lift${c.l>1?'s':''})</span><span class="am">${F(result.grand)}</span></div>`;

    const warn = (c.s.length > 1 && c.s.some(s => s.e !== c.s[0].e))
      ? '<div class="warn">Note: sub-lifts have different expiry dates &mdash; fees calculated individually.</div>'
      : '';

    app.innerHTML = `<div class="fee-view"><div class="fee-card">
      <div class="top"><h2>${c.n}</h2><div class="info">${infoHtml}</div></div>
      ${datesHtml}
      ${body}
      ${totalHtml}
      ${warn}
      <div class="fee-note">
        Fees calculated as on ${FD(today)}.<br>
        Rules: Renewal &#8377;5,000 per lift (Private) &middot; Late penalty &#8377;500 per lift per month, capped at &#8377;1,500 &middot; Application window: 3 months before expiry &middot; Renewal validity: 5 years &middot; Govt lifts exempt.
      </div>
    </div></div>`;
  }
} else {
  /* --------------- List view --------------- */
  const PS = 24; let pg = 0, flt = "", typeFilter = "";
  function fil(){
    let f = flt.toLowerCase();
    return D.filter(c =>
      (!typeFilter || c.t === typeFilter) &&
      (!f || c.n.toLowerCase().includes(f) ||
             c.s.some(s => s.r.toLowerCase().includes(f)) ||
             String(c.i).includes(f))
    );
  }
  function ren(){
    let ls = fil(), pages = Math.ceil(ls.length/PS) || 1;
    if (pg >= pages) pg = Math.max(0, pages-1);
    let sl = ls.slice(pg*PS, (pg+1)*PS);
    let td = new Date(); td.setHours(0,0,0,0);
    let gh = '';
    sl.forEach(c => {
      const r = calcConsumer(c, td);
      const regs = c.s.length>1 ? c.s.map(s => (s.b||'')+'-'+s.r).join(', ') : c.s[0].r;
      gh += `<div class="c-card ${c.t==='G'?'g':''}" onclick="location.href='?id=${c.i}'">
        <span class="tag ${c.t}">${c.t==='G'?'GOVT':'PVT'}</span>
        <h3>${c.i}. ${c.n}</h3>
        <div class="meta">Reg: ${regs.substring(0,55)}${regs.length>55?'...':''} &middot; Lifts: ${c.l}</div>
        <div>As on ${FD(td)}: <span class="total">${F(r.grand)}</span></div>
      </div>`;
    });
    document.getElementById("grid").innerHTML = gh || '<p style="text-align:center;color:#888;grid-column:1/-1">No matches.</p>';
    let ph = '';
    for (let i=0; i<pages; i++) ph += `<button class="${i===pg?'act':''}" onclick="gp(${i})">${i+1}</button>`;
    document.getElementById("pgr").innerHTML = ph;
    document.getElementById("cnt").textContent = `${ls.length} of ${D.length}`;
  }
  window.gp = function(p){ pg = p; ren(); scrollTo(0,180); };
  app.innerHTML = `
    <div class="ctrls">
      <input type="text" id="srch" placeholder="Search name, reg no, or serial...">
      <select id="tfilt">
        <option value="">All types</option>
        <option value="P">Private only</option>
        <option value="G">Govt only</option>
      </select>
      <button onclick="window.print()">Print</button>
      <span id="cnt" style="align-self:center;color:#666;font-size:0.82rem;padding:0 4px"></span>
    </div>
    <div class="pager" id="pgr"></div>
    <div class="grid" id="grid"></div>`;
  document.getElementById("srch").addEventListener("input", e => { flt = e.target.value; pg = 0; ren(); });
  document.getElementById("tfilt").addEventListener("change", e => { typeFilter = e.target.value; pg = 0; ren(); });
  ren();
}
</script>
